<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Nancy Ndungu about her web development projects and portfolio.">
  <title>Contact - Nancy Ndungu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Contact Me</h1>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Send a Message</h2>
      <form action="/submit" method="POST" novalidate>
        <div class="form-grid">
          <label for="fullname">Full Name *</label>
          <input type="text" id="fullname" name="fullname" required>

          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>

          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="+254 7xx xxx">

          <label for="subject">Subject *</label>
          <select id="subject" name="subject" required>
            <option value="" disabled selected>Select a subject</option>
            <option value="general">General Inquiry</option>
            <option value="support">Technical Support</option>
            <option value="feedback">Feedback</option>
          </select>
        </div>

        <label for="message">Message *</label>
        <textarea id="message" name="message" required minlength="50" placeholder="Minimum 50 characters..."></textarea>

        <div class="checkbox-wrapper">
          <input type="checkbox" id="newsletter" name="newsletter" value="yes">
          <label for="newsletter">Newsletter subscription</label>
        </div>

        <button type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer>
    <p>Copyright &copy; 2026 Nancy Ndungu. All rights reserved.</p>
    <p>Contact: <a href="mailto:nndungu470@gmail.com">nndungu470@gmail.com</a></p>
  </footer>
</body>
</html>
