<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Section</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
        url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    }

    .hero-content {
      text-align: center;
      max-width: 700px;
      width: 100%;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .hero p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      margin-bottom: 24px;
      line-height: 1.6;
      color: #f3f4f6;
    }

    .hero-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .hero-btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      .hero {
        padding: 20px;
      }

      .hero h1 {
        font-size: 2rem;
      }

      .hero p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <h1>Build something amazing</h1>
      <p>Discover modern design, powerful features, and a seamless experience crafted for your next big idea.</p>
      <a href="#" class="hero-btn">Get Started</a>
    </div>
  </section>
</body>
</html>
