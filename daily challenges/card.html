<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reusable Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .card {
      width: 300px;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 16px;
    }

    .card-title {
      font-size: 20px;
      margin: 0 0 8px;
      color: #111827;
    }

    .card-description {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 12px;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tag {
      background: #e0f2fe;
      color: #0369a1;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .card-button {
      display: inline-block;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.25s ease;
    }

    .card-button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="card-image" src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" alt="Modern workspace" />
    <div class="card-content">
      <h3 class="card-title">Creative Workspace</h3>
      <p class="card-description">A sleek and inspiring setup designed for focus, creativity, and productive collaboration.</p>
      <div class="tags">
        <span class="tag">Design</span>
        <span class="tag">Inspiration</span>
        <span class="tag">UI</span>
      </div>
      <a href="#" class="card-button">Learn More</a>
    </div>
  </div>
</body>
</html>
