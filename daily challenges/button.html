<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Styles</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f7fb;
    }

    .button-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 24px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }

    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: 2px solid transparent;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: white;
      color: #2563eb;
      border-color: #2563eb;
    }

    .btn-secondary:hover {
      background: #eff6ff;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-disabled {
      background: #e5e7eb;
      color: #6b7280;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-disabled:hover {
      transform: none;
      box-shadow: none;
      background: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="button-group">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-disabled" disabled>Disabled</button>
  </div>
</body>
</html>
